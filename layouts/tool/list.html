{{ define "main" }}
<article class="max-w-full">
  <header>
    <h1 class="mt-0 text-4xl font-extrabold text-neutral-900 dark:text-neutral">{{ .Title | emojify }}</h1>
  </header>

  <div class="bm-tool-copy mt-6">
    <div class="bm-tool-desc prose dark:prose-invert max-w-full">{{ .Content }}</div>
    {{ with .Params.tool_url }}
    <a class="bm-cta bm-cta-primary bm-cta-lg" href="{{ . }}" target="_blank" rel="noopener">
      {{ i18n "tool_visit" }}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
    {{ end }}
  </div>
</article>
{{ end }}
